<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jouez au 2048 en ligne - Le puzzle addictif où vous fusionnez des tuiles pour atteindre 2048!">
    <title>2048 Master - Puzzle Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-gradient-start: #1a1a2e;
            --bg-gradient-mid: #16213e;
            --bg-gradient-end: #0f3460;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --grid-bg: #bbada0;
            --cell-bg: rgba(238, 228, 218, 0.35);
        }

        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-mid), var(--bg-gradient-end));
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #edc531;
            border-radius: 50%;
            opacity: 0.3;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 500px;
            width: 100%;
        }

        /* Back Button */
        .back-to-menu-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 12px 20px;
            color: var(--text-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .back-to-menu-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(-3px);
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #edc531, #f7b731, #fa8231, #eb3b5a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            animation: glow 3s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 20px rgba(247, 183, 49, 0.3)); }
            to { filter: drop-shadow(0 0 40px rgba(250, 130, 49, 0.4)); }
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        /* Score Container */
        .score-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .score-box {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 12px 25px;
            text-align: center;
            backdrop-filter: blur(10px);
            min-width: 100px;
        }

        .score-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-value {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #edc531, #fa8231);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Game Board */
        .game-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            background: var(--grid-bg);
            border-radius: 12px;
            padding: 12px;
        }

        .cell {
            aspect-ratio: 1;
            background: var(--cell-bg);
            border-radius: 6px;
        }

        .tiles-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .tile {
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
            border-radius: 6px;
            transition: transform 0.15s ease-in-out;
            will-change: transform;
        }

        /* Tile Colors */
        .tile[data-value="2"] { background: #eee4da; color: #776e65; }
        .tile[data-value="4"] { background: #ede0c8; color: #776e65; }
        .tile[data-value="8"] { background: #f2b179; color: #f9f6f2; }
        .tile[data-value="16"] { background: #f59563; color: #f9f6f2; }
        .tile[data-value="32"] { background: #f67c5f; color: #f9f6f2; }
        .tile[data-value="64"] { background: #f65e3b; color: #f9f6f2; }
        .tile[data-value="128"] { background: #edcf72; color: #f9f6f2; box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.3); font-size: 1.8rem; }
        .tile[data-value="256"] { background: #edcc61; color: #f9f6f2; box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.4); font-size: 1.8rem; }
        .tile[data-value="512"] { background: #edc850; color: #f9f6f2; box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.5); font-size: 1.8rem; }
        .tile[data-value="1024"] { background: #edc53f; color: #f9f6f2; box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.6); font-size: 1.5rem; }
        .tile[data-value="2048"] { background: #edc22e; color: #f9f6f2; box-shadow: 0 0 40px 15px rgba(237, 194, 46, 0.8); font-size: 1.5rem; animation: pulse 0.5s ease infinite alternate; }
        .tile.super { background: #3c3a32; color: #f9f6f2; font-size: 1.2rem; }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.03); }
        }

        .tile.new {
            animation: appear 0.2s ease backwards;
        }

        .tile.merged {
            animation: pop 0.2s ease;
        }

        @keyframes appear {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* Game Overlay */
        .game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px);
            border-radius: 12px;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
        }

        .game-overlay.active {
            display: flex;
        }

        .overlay-title {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #edc531, #fa8231);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .overlay-score {
            font-size: 1.2rem;
            color: var(--text-secondary);
        }

        /* Controls */
        .controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            background: linear-gradient(135deg, #edc531, #fa8231);
            border: none;
            border-radius: 12px;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: 600;
            color: #1a1a2e;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(237, 197, 49, 0.4);
        }

        .btn.secondary {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-primary);
        }

        .btn.secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Instructions */
        .instructions {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 20px;
        }

        .instructions strong {
            color: var(--text-primary);
        }

        /* Responsive */
        @media (max-width: 500px) {
            .logo { font-size: 3rem; }
            .grid { gap: 8px; padding: 8px; }
            .tile { font-size: 1.5rem; }
            .tile[data-value="128"], .tile[data-value="256"], .tile[data-value="512"] { font-size: 1.3rem; }
            .tile[data-value="1024"], .tile[data-value="2048"] { font-size: 1.1rem; }
            .tile.super { font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <a href="/" class="back-to-menu-btn">
        <span>←</span>
        <span>Menu</span>
    </a>

    <div class="particles" id="particles"></div>

    <div class="container">
        <header class="header">
            <h1 class="logo">2048</h1>
            <p class="subtitle">Fusionnez les tuiles pour atteindre 2048!</p>
        </header>

        <div class="score-container">
            <div class="score-box">
                <div class="score-label">Score</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="score-box">
                <div class="score-label">Meilleur</div>
                <div class="score-value" id="best-score">0</div>
            </div>
        </div>

        <div class="game-wrapper" id="game-wrapper">
            <div class="grid" id="grid">
                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            </div>
            
            <div class="tiles-container" id="tiles-container"></div>
            
            <div class="game-overlay" id="game-over">
                <div class="overlay-title">Game Over!</div>
                <div class="overlay-score">Score: <span id="final-score">0</span></div>
                <button class="btn" id="btn-retry">🔄 Réessayer</button>
            </div>

            <div class="game-overlay" id="game-won">
                <div class="overlay-title">🎉 Victoire!</div>
                <div class="overlay-score">Vous avez atteint 2048!</div>
                <button class="btn" id="btn-continue">▶️ Continuer</button>
                <button class="btn secondary" id="btn-new-after-win">🔄 Nouvelle Partie</button>
            </div>
        </div>

        <div class="controls">
            <button class="btn" id="btn-new-game">🔄 Nouvelle Partie</button>
        </div>

        <p class="instructions">
            Utilisez les <strong>flèches du clavier</strong> ou <strong>glissez</strong> pour déplacer les tuiles.
        </p>
    </div>

    <script>
        class Tile {
            constructor(r, c, value, game) {
                this.r = r;
                this.c = c;
                this.value = value;
                this.mergedThisTurn = false;
                
                this.element = document.createElement('div');
                this.element.className = 'tile new';
                this.setValue(value);
                
                // Set initial position instantly without transition
                this.element.style.transition = 'none';
                this.updatePosition(game);
                
                document.getElementById('tiles-container').appendChild(this.element);
                
                // Re-enable transition after a tiny delay so the element render bounds apply
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        this.element.style.transition = 'transform 0.15s ease-in-out';
                    });
                });
                
                // Remove 'new' class after animation so it doesn't replay
                setTimeout(() => {
                    this.element.classList.remove('new');
                }, 200);
            }

            setValue(value) {
                this.value = value;
                this.element.textContent = value;
                this.element.setAttribute('data-value', value > 2048 ? 'super' : value);
                if (value > 2048) this.element.classList.add('super');
                else this.element.classList.remove('super');
            }

            setPosition(r, c, game) {
                this.r = r;
                this.c = c;
                this.updatePosition(game);
            }

            updatePosition(game) {
                const cells = document.querySelectorAll('.cell');
                const cell = cells[this.r * 4 + this.c];
                if (!cell) return;
                
                const gridRect = document.getElementById('grid').getBoundingClientRect();
                const cellRect = cell.getBoundingClientRect();
                
                const x = cellRect.left - gridRect.left;
                const y = cellRect.top - gridRect.top;
                
                this.element.style.transform = `translate(${x}px, ${y}px)`;
                this.element.style.width = `${cellRect.width}px`;
                this.element.style.height = `${cellRect.height}px`;
            }

            remove() {
                this.element.remove();
            }
        }

        class Game2048 {
            constructor() {
                this.grid = Array(4).fill(null).map(() => Array(4).fill(null));
                this.score = 0;
                this.bestScore = parseInt(localStorage.getItem('2048-best') || '0');
                this.gameOver = false;
                this.won = false;
                this.keepPlaying = false;
                this.isAnimating = false;
                
                this.init();
            }

            init() {
                this.createParticles();
                this.bindEvents();
                document.getElementById('best-score').textContent = this.bestScore;
                this.newGame();
                
                window.addEventListener('resize', () => {
                    for (let r = 0; r < 4; r++) {
                        for (let c = 0; c < 4; c++) {
                            if (this.grid[r][c]) {
                                this.grid[r][c].updatePosition(this);
                            }
                        }
                    }
                });
            }

            createParticles() {
                const container = document.getElementById('particles');
                for (let i = 0; i < 30; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.animationDelay = Math.random() * 15 + 's';
                    particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                    container.appendChild(particle);
                }
            }

            bindEvents() {
                document.addEventListener('keydown', (e) => {
                    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                        e.preventDefault();
                        this.handleMove(e.key.replace('Arrow', '').toLowerCase());
                    }
                });

                let touchStartX, touchStartY;
                const gameWrapper = document.getElementById('game-wrapper');
                
                gameWrapper.addEventListener('touchstart', (e) => {
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                }, { passive: true });

                gameWrapper.addEventListener('touchend', (e) => {
                    if (!touchStartX || !touchStartY) return;
                    
                    const dx = e.changedTouches[0].clientX - touchStartX;
                    const dy = e.changedTouches[0].clientY - touchStartY;
                    const absDx = Math.abs(dx);
                    const absDy = Math.abs(dy);
                    
                    if (Math.max(absDx, absDy) > 30) {
                        if (absDx > absDy) {
                            this.handleMove(dx > 0 ? 'right' : 'left');
                        } else {
                            this.handleMove(dy > 0 ? 'down' : 'up');
                        }
                    }
                    touchStartX = null;
                    touchStartY = null;
                }, { passive: true });

                document.getElementById('btn-new-game').addEventListener('click', () => this.newGame());
                document.getElementById('btn-retry').addEventListener('click', () => this.newGame());
                document.getElementById('btn-continue').addEventListener('click', () => {
                    this.keepPlaying = true;
                    document.getElementById('game-won').classList.remove('active');
                });
                document.getElementById('btn-new-after-win').addEventListener('click', () => {
                    document.getElementById('game-won').classList.remove('active');
                    this.newGame();
                });
            }

            newGame() {
                for (let r = 0; r < 4; r++) {
                    for (let c = 0; c < 4; c++) {
                        if (this.grid[r][c]) {
                            this.grid[r][c].remove();
                            this.grid[r][c] = null;
                        }
                    }
                }
                document.getElementById('tiles-container').innerHTML = '';
                
                this.score = 0;
                this.gameOver = false;
                this.won = false;
                this.keepPlaying = false;
                this.isAnimating = false;
                
                document.getElementById('score').textContent = '0';
                document.getElementById('game-over').classList.remove('active');
                document.getElementById('game-won').classList.remove('active');
                
                this.addRandomTile();
                this.addRandomTile();
            }

            addRandomTile() {
                const emptyCells = [];
                for (let r = 0; r < 4; r++) {
                    for (let c = 0; c < 4; c++) {
                        if (!this.grid[r][c]) {
                            emptyCells.push({ r, c });
                        }
                    }
                }
                
                if (emptyCells.length === 0) return false;
                
                const { r, c } = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                const value = Math.random() < 0.9 ? 2 : 4;
                this.grid[r][c] = new Tile(r, c, value, this);
                return { r, c };
            }

            handleMove(direction) {
                if (this.gameOver || this.isAnimating) return;
                
                const moved = this.move(direction);
                
                if (moved) {
                    this.isAnimating = true;
                    
                    setTimeout(() => {
                        this.addRandomTile();
                        this.isAnimating = false;
                        
                        if (!this.won && !this.keepPlaying && this.hasWon()) {
                            this.won = true;
                            setTimeout(() => {
                                document.getElementById('game-won').classList.add('active');
                            }, 200);
                        }
                        
                        if (this.isGameOver()) {
                            this.gameOver = true;
                            document.getElementById('final-score').textContent = this.score;
                            setTimeout(() => {
                                document.getElementById('game-over').classList.add('active');
                            }, 200);
                        }
                    }, 150);
                }
            }

            move(direction) {
                let moved = false;
                
                const getVector = () => {
                    if (direction === 'up') return { x: 0, y: -1 };
                    if (direction === 'right') return { x: 1, y: 0 };
                    if (direction === 'down') return { x: 0, y: 1 };
                    if (direction === 'left') return { x: -1, y: 0 };
                };
                
                const vector = getVector();
                const traversals = this.buildTraversals(vector);
                
                for (let r = 0; r < 4; r++) {
                    for (let c = 0; c < 4; c++) {
                        if (this.grid[r][c]) {
                            this.grid[r][c].mergedThisTurn = false;
                        }
                    }
                }
                
                const tilesToRemove = [];
                const tilesToUpgrade = [];
                
                traversals.x.forEach(c => {
                    traversals.y.forEach(r => {
                        const tile = this.grid[r][c];
                        if (tile) {
                            const positions = this.findFarthestPosition({ r, c }, vector);
                            const nextCell = this.grid[positions.next.r]?.[positions.next.c];
                            
                            if (nextCell && nextCell.value === tile.value && !nextCell.mergedThisTurn) {
                                // Merge
                                tile.setPosition(positions.next.r, positions.next.c, this);
                                
                                this.grid[r][c] = null;
                                nextCell.mergedThisTurn = true;
                                
                                tilesToRemove.push(tile);
                                tilesToUpgrade.push({ tile: nextCell, newValue: nextCell.value * 2 });
                                
                                this.score += nextCell.value * 2;
                                moved = true;
                            } else {
                                // Slide
                                if (positions.farthest.r !== r || positions.farthest.c !== c) {
                                    this.grid[r][c] = null;
                                    this.grid[positions.farthest.r][positions.farthest.c] = tile;
                                    tile.setPosition(positions.farthest.r, positions.farthest.c, this);
                                    moved = true;
                                }
                            }
                        }
                    });
                });
                
                if (moved) {
                    setTimeout(() => {
                        tilesToRemove.forEach(t => t.remove());
                        
                        tilesToUpgrade.forEach(({tile, newValue}) => {
                            tile.setValue(newValue);
                            tile.element.classList.remove('merged', 'new');
                            void tile.element.offsetWidth; // Trigger DOM reflow to restart animation
                            tile.element.classList.add('merged');
                        });
                    }, 150);

                    document.getElementById('score').textContent = this.score;
                    if (this.score > this.bestScore) {
                        this.bestScore = this.score;
                        localStorage.setItem('2048-best', this.bestScore);
                        document.getElementById('best-score').textContent = this.bestScore;
                    }
                }
                
                return moved;
            }

            buildTraversals(vector) {
                const traversals = { x: [0, 1, 2, 3], y: [0, 1, 2, 3] };
                if (vector.x === 1) traversals.x = traversals.x.reverse();
                if (vector.y === 1) traversals.y = traversals.y.reverse();
                return traversals;
            }

            findFarthestPosition(cell, vector) {
                let previous;
                let current = { r: cell.r, c: cell.c };
                
                do {
                    previous = { r: current.r, c: current.c };
                    current.r += vector.y;
                    current.c += vector.x;
                } while (this.withinBounds(current) && !this.grid[current.r][current.c]);
                
                return {
                    farthest: previous,
                    next: current
                };
            }

            withinBounds(cell) {
                return cell.r >= 0 && cell.r < 4 && cell.c >= 0 && cell.c < 4;
            }

            hasWon() {
                for (let r = 0; r < 4; r++) {
                    for (let c = 0; c < 4; c++) {
                        if (this.grid[r][c] && this.grid[r][c].value >= 2048) return true;
                    }
                }
                return false;
            }

            isGameOver() {
                for (let r = 0; r < 4; r++) {
                    for (let c = 0; c < 4; c++) {
                        if (!this.grid[r][c]) return false;
                    }
                }
                for (let r = 0; r < 4; r++) {
                    for (let c = 0; c < 4; c++) {
                        const val = this.grid[r][c].value;
                        if (c < 3 && this.grid[r][c + 1] && this.grid[r][c + 1].value === val) return false;
                        if (r < 3 && this.grid[r + 1][c] && this.grid[r + 1][c].value === val) return false;
                    }
                }
                return true;
            }
        }

        const game = new Game2048();
    </script>
<script src="score-sync.js"></script></body>
</html>
